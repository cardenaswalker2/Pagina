<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | Luis Devp</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #FAF9F6;
            --bg-secondary: #F3F1EC;
            --accent-color: #8C6D58; /* Warm copper */
            --accent-hover: #755B49;
            --text-main: #2C2A29;
            --text-muted: #7A7571;
            --border-color: rgba(44, 42, 41, 0.08);
            --card-bg: #FFFFFF;
            --transition: all 0.3s ease;
            --shadow: 0 4px 15px rgba(140, 109, 88, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .login-card h2 {
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--accent-color);
        }

        .btn-submit {
            background: var(--accent-color);
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 0.8rem;
        }

        .btn-submit:hover {
            background: var(--accent-hover);
        }

        .alert-error {
            background: #FEE2E2;
            border: 1px solid #FECACA;
            color: #DC2626;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            text-align: center;
        }

        .link-text {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .link-text a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Registro de Cuenta</h2>
        
        <div class="alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/registro}" method="POST" style="display:flex; flex-direction:column; gap:1rem">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required placeholder="Nombre de usuario">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="correo@empresa.com">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-submit">Registrarse</button>
        </form>

        <p class="link-text">¿Ya tienes cuenta? <a href="/login">Inicia Sesión</a></p>
        <p class="link-text"><a href="/">Volver al Inicio</a></p>
    </div>

</body>
</html>
